<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Canvas</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid #333;
            background-color: white;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas" width="800" height="800"></canvas>
    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        
        // Configuration
        const cubeSize = 100;
        const circleRadius = 12;
        const roadY = 600;  // The actual road surface level
        const wheelDiameter = cubeSize;
        
        let wheelX = 100;
        let wheelY = roadY - wheelDiameter / 2;
        let rotation = 0;
        const rollSpeed = 1.5;
        
        function drawRoad() {
            // Road background
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, roadY, canvas.width, canvas.height);
            
            // Road line
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.setLineDash([20, 10]);
            ctx.beginPath();
            ctx.moveTo(0, roadY);
            ctx.lineTo(canvas.width, roadY);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawCube(x, y, angle) {
            const size = cubeSize;
            
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.translate(-size / 2, -size / 2);
            
            // Front face
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(0, 0, size, size);
            ctx.strokeStyle = '#2E7D32';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, size, size);
            
            // Top face
            const topPoints = [
                [0, 0],
                [12, -12],
                [size + 12, -12],
                [size, 0]
            ];
            ctx.fillStyle = '#66BB6A';
            ctx.beginPath();
            ctx.moveTo(topPoints[0][0], topPoints[0][1]);
            for (let i = 1; i < topPoints.length; i++) {
                ctx.lineTo(topPoints[i][0], topPoints[i][1]);
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#2E7D32';
            ctx.stroke();
            
            // Right face
            const rightPoints = [
                [size, 0],
                [size + 12, -12],
                [size + 12, -12 + size],
                [size, size]
            ];
            ctx.fillStyle = '#388E3C';
            ctx.beginPath();
            ctx.moveTo(rightPoints[0][0], rightPoints[0][1]);
            for (let i = 1; i < rightPoints.length; i++) {
                ctx.lineTo(rightPoints[i][0], rightPoints[i][1]);
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#1B5E20';
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawCircle(x, y) {
            const radius = circleRadius;
            
            // Shadow/back of circle
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.arc(x + 2, y + 2, radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Main circle
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Highlight for 3D effect
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(x - 6, y - 6, radius / 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Circle outline
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        function calculateWheelHeight(rotation) {
            // Normalize rotation to 0-2π range
            const normalizedRotation = rotation % (Math.PI * 2);
            
            // Each 90-degree (π/2) rotation represents one edge
            const quarterRotation = normalizedRotation % (Math.PI / 2);
            const quarterPhase = quarterRotation / (Math.PI / 2);
            
            // Distance from center to corner of square
            const diagonalHalf = (cubeSize * Math.sqrt(2)) / 2;
            
            // Calculate height above road surface
            // When phase = 0: edge flat on ground, center is cubeSize/2 above road
            // When phase = 1: next edge flat, center is cubeSize/2 above road
            // When phase = 0.5: corner touches ground, center rises to diagonal distance
            
            const heightAboveRoad = cubeSize / 2 + 
                                    (diagonalHalf - cubeSize / 2) * 
                                    Math.sin(quarterPhase * Math.PI);
            
            return roadY - heightAboveRoad;
        }
        
        function calculateWheelX(rotation) {
            // Move X position based on rotation only
            // Each full rotation (2π) moves the wheel by one side length (cubeSize)
            // This creates proper rolling without slipping
            const distanceTraveled = (rotation / (Math.PI * 2)) * cubeSize;
            return 100 + distanceTraveled;
        }
        
        function animate() {
            // Clear canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw road
            drawRoad();
            
            // Update rotation
            rotation += rollSpeed * 0.02; // Slower rotation
            
            // Calculate wheel position based on proper rolling physics
            wheelX = calculateWheelX(rotation);
            wheelY = calculateWheelHeight(rotation);
            
            // Reset wheel when it goes off screen
            if (wheelX > canvas.width + cubeSize) {
                wheelX = -cubeSize;
                rotation = 0;
            }
            
            // Draw wheel
            drawCube(wheelX, wheelY, rotation);
            drawCircle(wheelX, wheelY);
            
            // Continue animation
            requestAnimationFrame(animate);
        }
        
        // Start animation
        animate();
    </script>
</body>
</html>
